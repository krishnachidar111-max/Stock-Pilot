<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - SupplyAI</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-shell">
    <section class="auth-hero hero-card">
      <p class="eyebrow">Create account</p>
      <h1>Build your smart inventory workspace</h1>
      <p>Start with a local demo setup that supports login, product management, CSV uploads, analytics, alerts and business recommendations.</p>
    </section>

    <section class="auth-card">
      <p class="eyebrow">New account</p>
      <h2>Register</h2>
      <form id="registerForm">
        <div>
          <label>Full name</label>
          <input type="text" id="name" placeholder="Krishna Chidar" required />
        </div>
        <div>
          <label>Email</label>
          <input type="email" id="email" placeholder="you@example.com" required />
        </div>
        <div>
          <label>Password</label>
          <input type="password" id="password" placeholder="Minimum 6 characters" required />
        </div>
        <div>
          <label>Role</label>
          <select id="role">
            <option value="admin">Admin</option>
            <option value="staff">Staff</option>
          </select>
        </div>
        <button type="submit">Create Account</button>
      </form>
      <div id="registerMessage"></div>
      <div class="auth-links">
        <span class="muted">Already have an account?</span>
        <a href="login.html">Back to login</a>
      </div>
    </section>
  </div>

  <script src="js/app.js"></script>
  <script>
    document.getElementById("registerForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      try {
        const data = await apiFetch("/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            password: document.getElementById("password").value,
            role: document.getElementById("role").value
          })
        });
        showMessage("registerMessage", data.message + " Redirecting to login...", "success");
        setTimeout(() => window.location.href = "login.html", 900);
      } catch (error) {
        showMessage("registerMessage", error.message, "error");
      }
    });
  </script>
</body>
</html>
