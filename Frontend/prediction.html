<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prediction - SupplyAI</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar-shell"></aside>
    <main class="content">
      <header class="topbar" id="topbar-shell"></header>

<section class="grid-2">
  <div class="panel">
    <div class="toolbar"><h3>Demand forecast summary</h3><span class="badge info">AI estimate</span></div>
    <div id="predictionCards" class="kpi-list"></div>
  </div>
  <div class="chart-card">
    <div class="toolbar"><h3>Demand vs stock</h3><span class="badge success">Weekly view</span></div>
    <canvas id="predictionChart"></canvas>
  </div>
</section>

      <p class="footer-note">SupplyAI local demo • Smart inventory dashboard with animated glassmorphism UI</p>
    </main>
  </div>
  <script src="js/app.js"></script>
  <script src="js/prediction.js"></script>
</body>
</html>
